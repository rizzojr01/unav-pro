name: smart_sense
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.3

  # Network
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.3

  # Functional Programming
  dartz: ^0.10.1

  # Camera
  camera: ^0.11.0+2
  path_provider: ^2.1.5

  # Location
  geolocator: ^13.0.2

  # WiFi info (for BSSID-based auto-detection)
  network_info_plus: ^6.0.1

  # Sensors
  flutter_compass: ^0.8.1
  sensors_plus: ^6.1.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # Utilities
  logger: ^2.5.0
  uuid: ^4.5.1
  go_router: ^14.0.0
  flutter_dotenv: ^5.1.0
  flex_color_scheme: ^8.4.0
  camera_macos: ^0.0.9
  device_info_plus: ^12.3.0
  fuzzy: ^0.5.1
  stream_transform: ^2.1.1
  image: ^4.3.0
  firebase_crashlytics: ^4.3.10

  # Audio
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/unav_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/unav_logo.png"

flutter:
  config:
    enable-swift-package-manager: false

  uses-material-design: true

  assets:
    - .env
    - assets/mock_data/
    - assets/images/
    - assets/images/sample_images/
    - assets/node_images/
    - assets/sounds/
