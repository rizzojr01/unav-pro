name: smart_sense
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.3

  # Network
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.3

  # Functional Programming
  dartz: ^0.10.1

  # Camera
  camera: ^0.11.0+2
  path_provider: ^2.1.5

  # Location
  geolocator: ^13.0.2

  # Utilities
  logger: ^2.5.0
  uuid: ^4.5.1
  go_router: ^17.0.1
  flutter_dotenv: ^5.1.0
  flex_color_scheme: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/mock_data/

